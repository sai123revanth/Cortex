<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#e0c3fc">
    
    <!-- SEO Optimization -->
    <title>Cortex | Secure & Fast Messaging</title>
    <meta name="description" content="Cortex is a modern, highly professional web messaging application. Experience lightning-fast, secure text messaging directly from your browser.">
    <meta name="keywords" content="Cortex app, web messaging, secure texting, chat interface, modern messaging, responsive chat app, glassmorphism">
    <meta name="author" content="Cortex Communications">

    <!-- Tailwind CSS (Framework) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Phosphor Icons (Modern crisp icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts (Inter for a highly professional, readable look) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                        }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.15)',
                        'glass-inner': 'inset 0 1px 1px rgba(255, 255, 255, 0.4)',
                    }
                }
            }
        }
    </script>

    <!-- Custom App Styling -->
    <style>
        /* Smooth anti-aliasing */
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            
            /* Animated Gradient Background for Glassmorphism */
            background: linear-gradient(-45deg, #e0c3fc, #8ec5fc, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Clean unobtrusive scrollbars for desktop */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.4);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.6);
        }

        /* Hide scrollbar for lists */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Message bubble tails */
        .msg-tail-left { border-bottom-left-radius: 4px !important; }
        .msg-tail-right { border-bottom-right-radius: 4px !important; }
    </style>

    <!-- Structured Data (JSON-LD) for SEO -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Cortex",
      "url": "https://www.cortex.app",
      "applicationCategory": "CommunicationApplication",
      "operatingSystem": "Desktop",
      "offers": {
        "@type": "Offer",
        "price": "0"
      },
      "description": "Cortex is a highly professional web application for SMS and messaging, optimized for desktop browsers with a beautiful glassmorphism interface."
    }
    </script>
</head>

<!-- Strictly span 100% of viewport height and width -->
<body class="text-gray-900 h-screen w-screen overflow-hidden m-0 p-0 flex">

    <!-- Main App Container: Full Screen Glassmorphism Desktop Layout -->
    <div class="w-full h-full flex bg-white/30 backdrop-blur-xl z-10">
        
        <!-- ========================================== -->
        <!-- SIDEBAR / CONVERSATION LIST                -->
        <!-- ========================================== -->
        <aside id="sidebar" class="w-80 lg:w-96 flex-shrink-0 border-r border-white/30 bg-white/10 flex flex-col h-full">
            
            <!-- App Header -->
            <header class="p-5 flex items-center justify-between border-b border-white/20">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white shadow-lg shadow-brand-500/30 border border-white/20">
                        <i class="ph ph-brain text-2xl"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-tight text-gray-800 drop-shadow-sm">Cortex</h1>
                </div>
                <button aria-label="New Message" class="p-2 text-gray-700 bg-white/20 hover:bg-white/40 border border-white/30 rounded-full transition-all shadow-sm">
                    <i class="ph ph-plus text-xl"></i>
                </button>
            </header>

            <!-- Search Bar -->
            <div class="px-5 py-4">
                <div class="relative">
                    <i class="ph ph-magnifying-glass absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 text-lg"></i>
                    <input type="text" placeholder="Search..." class="w-full bg-white/30 border border-white/40 text-sm text-gray-800 rounded-2xl pl-11 pr-4 py-3 focus:outline-none focus:bg-white/50 focus:ring-2 focus:ring-white/50 transition-all placeholder-gray-500 shadow-glass-inner" aria-label="Search conversations">
                </div>
            </div>

            <!-- Conversations List -->
            <nav class="flex-1 overflow-y-auto no-scrollbar" aria-label="Conversations">
                <ul id="conversation-list" class="flex flex-col p-2 space-y-1">
                    <!-- Empty State for Fresh Look -->
                    <li class="h-40 flex flex-col items-center justify-center text-center p-4">
                        <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center border border-white/30 mb-3">
                            <i class="ph ph-lock-key text-2xl text-gray-600"></i>
                        </div>
                        <p class="text-sm font-medium text-gray-700">Authentication Required</p>
                        <p class="text-xs text-gray-500 mt-1">Please log in to view chats.</p>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- ========================================== -->
        <!-- MAIN CHAT AREA                             -->
        <!-- ========================================== -->
        <main id="chat-area" class="flex-1 bg-transparent flex flex-col h-full min-w-0 relative">
            
            <!-- Chat Header -->
            <header id="chat-header" class="bg-white/20 backdrop-blur-md border-b border-white/30 px-6 py-4 hidden items-center justify-between z-10 shrink-0">
                <div class="flex items-center gap-4">
                    <div class="relative cursor-pointer">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-gray-200 to-white flex items-center justify-center border border-white/50 shadow-sm text-gray-400">
                            <i class="ph ph-shield-check text-xl"></i>
                        </div>
                        <span id="active-chat-status-dot" class="absolute bottom-0 right-0 w-3 h-3 bg-gray-400 border-2 border-transparent shadow-[0_0_0_2px_rgba(255,255,255,0.5)] rounded-full"></span>
                    </div>
                    <div>
                        <h2 id="active-chat-name" class="text-lg font-bold text-gray-800 leading-tight drop-shadow-sm">Secure Portal</h2>
                        <p id="active-chat-status" class="text-sm text-gray-600 font-medium">Not logged in</p>
                    </div>
                </div>
                
                <div id="header-actions" class="items-center gap-3 hidden">
                    <button aria-label="Voice Call" class="p-2.5 text-gray-700 bg-white/20 hover:bg-white/40 border border-white/30 rounded-full transition-all">
                        <i class="ph ph-phone text-xl"></i>
                    </button>
                    <button aria-label="Video Call" class="p-2.5 text-gray-700 bg-white/20 hover:bg-white/40 border border-white/30 rounded-full transition-all">
                        <i class="ph ph-video-camera text-xl"></i>
                    </button>
                    <button aria-label="More Options" class="p-2.5 text-gray-700 bg-white/20 hover:bg-white/40 border border-white/30 rounded-full transition-all">
                        <i class="ph ph-dots-three-outline-vertical text-xl"></i>
                    </button>
                </div>
            </header>

            <!-- Message History / Auth Area -->
            <section id="message-container" class="flex-1 overflow-y-auto p-6 space-y-6 flex flex-col relative" aria-live="polite">
                
                <!-- Auth State (Login/Register Prompt) -->
                <div id="auth-state" class="flex flex-col items-center justify-center h-full flex-1 w-full m-auto">
                    <div class="bg-white/30 backdrop-blur-xl p-10 rounded-[2.5rem] border border-white/40 shadow-glass w-full max-w-md text-center flex flex-col items-center relative overflow-hidden">
                        <!-- Decorative background elements -->
                        <div class="absolute -top-10 -right-10 w-40 h-40 bg-white/20 rounded-full blur-2xl"></div>
                        <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-brand-300/20 rounded-full blur-2xl"></div>
                        
                        <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center text-white shadow-lg shadow-brand-500/30 border border-white/20 mb-6 relative z-10">
                            <i class="ph ph-fingerprint text-4xl"></i>
                        </div>
                        
                        <h3 class="text-3xl font-bold text-gray-800 drop-shadow-sm mb-3 relative z-10">Welcome to Cortex</h3>
                        <p class="text-base text-gray-600 mb-8 px-2 relative z-10">Secure, encrypted, and lightning-fast messaging. Please log in or create an account to begin your session.</p>
                        
                        <div class="flex flex-col gap-4 w-full relative z-10">
                            <button onclick="window.location.href='login.html'" class="w-full py-4 bg-gradient-to-br from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white rounded-2xl shadow-lg shadow-brand-500/30 border border-brand-400/50 transition-all font-semibold text-lg flex items-center justify-center gap-2">
                                <i class="ph ph-sign-in text-xl"></i>
                                Log In
                            </button>
                            <button onclick="window.location.href='login.html'" class="w-full py-4 bg-white/40 hover:bg-white/60 text-gray-800 rounded-2xl border border-white/60 transition-all font-semibold shadow-sm text-lg flex items-center justify-center gap-2">
                                <i class="ph ph-user-plus text-xl"></i>
                                Register Account
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Spacer for scrolling -->
                <div id="chat-bottom" class="h-1 mt-auto"></div>
            </section>

            <!-- Message Input Area (Hidden initially) -->
            <footer id="chat-footer" class="bg-white/20 backdrop-blur-md border-t border-white/30 p-5 shrink-0 z-10 hidden">
                <form id="message-form" class="flex items-end gap-3 max-w-6xl mx-auto" onsubmit="sendMessage(event)">
                    
                    <button type="button" aria-label="Add Attachment" class="p-3.5 text-gray-600 bg-white/20 hover:bg-white/40 border border-white/30 rounded-full transition-all flex-shrink-0">
                        <i class="ph ph-paperclip text-xl"></i>
                    </button>
                    
                    <div class="flex-1 bg-white/30 rounded-3xl flex items-center pr-2 pl-5 border border-white/40 focus-within:bg-white/50 focus-within:border-white/60 focus-within:shadow-glass-inner transition-all">
                        <textarea 
                            id="message-input" 
                            rows="1" 
                            placeholder="Type your message..." 
                            class="w-full bg-transparent border-none py-4 text-[15px] text-gray-800 placeholder-gray-500 focus:outline-none resize-none no-scrollbar"
                            aria-label="Message text input"
                            oninput="this.style.height = '';this.style.height = Math.min(this.scrollHeight, 120) + 'px'"
                        ></textarea>
                        
                        <button type="button" aria-label="Insert Emoji" class="p-2.5 text-gray-500 hover:text-gray-800 transition-colors flex-shrink-0">
                            <i class="ph ph-smiley text-xl"></i>
                        </button>
                    </div>

                    <button type="submit" aria-label="Send Message" class="p-4 bg-gradient-to-br from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white rounded-full shadow-lg shadow-brand-500/30 border border-brand-400/50 transition-all transform active:scale-95 flex-shrink-0 disabled:opacity-50 disabled:cursor-not-allowed" id="send-btn">
                        <i class="ph-fill ph-paper-plane-right text-xl"></i>
                    </button>
                </form>
            </footer>
        </main>
    </div>

    <!-- Application Logic -->
    <script>
        // DOM Elements
        const messageInput = document.getElementById('message-input');
        const messageContainer = document.getElementById('message-container');
        const chatBottom = document.getElementById('chat-bottom');
        let isFirstMessage = true;

        // Scroll to newest message
        function scrollToBottom() {
            setTimeout(() => {
                chatBottom.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 50);
        }

        // Simulate Login Transition
        function simulateLogin() {
            // Hide Auth State
            const authState = document.getElementById('auth-state');
            authState.style.opacity = '0';
            setTimeout(() => {
                authState.style.display = 'none';
                
                // Show Chat Header
                document.getElementById('chat-header').classList.remove('hidden');
                document.getElementById('chat-header').classList.add('flex', 'animate-fade-in');
                
                // Show Footer Input
                document.getElementById('chat-footer').classList.remove('hidden');
                document.getElementById('chat-footer').classList.add('block', 'animate-fade-in');
                
                // Show Header Actions
                document.getElementById('header-actions').classList.remove('hidden');
                document.getElementById('header-actions').classList.add('flex', 'animate-fade-in');
                
                // Update Header Status
                document.getElementById('active-chat-name').textContent = 'New Conversation';
                document.getElementById('active-chat-status').textContent = 'Ready to chat';
                
                // Update Sidebar
                document.querySelector('#conversation-list li').innerHTML = `
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center border border-white/30 mb-3">
                        <i class="ph ph-chats text-2xl text-gray-600"></i>
                    </div>
                    <p class="text-sm font-medium text-gray-700">No active conversations</p>
                    <p class="text-xs text-gray-500 mt-1">Click the + button to start chatting.</p>
                `;

                // Update Avatar Status dot to green
                document.getElementById('active-chat-status-dot').classList.replace('bg-gray-400', 'bg-green-400');
                
                // Inject the Empty Chat Greeting
                const greetingState = `
                    <div id="greeting-state" class="flex flex-col items-center justify-center h-full opacity-90 m-auto animate-fade-in">
                        <button onclick="document.getElementById('message-input').focus()" class="bg-gradient-to-br from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white p-6 rounded-full shadow-lg shadow-brand-500/30 border border-brand-400/50 mb-6 transition-all transform hover:scale-110 active:scale-95" aria-label="Start new chat">
                            <i class="ph ph-plus text-5xl"></i>
                        </button>
                        <h3 class="text-2xl font-bold text-gray-800 drop-shadow-sm">Start a Conversation</h3>
                        <p class="text-base text-gray-600 mt-2 max-w-sm text-center">Click the plus icon to find someone and start chatting.</p>
                    </div>
                `;
                chatBottom.insertAdjacentHTML('beforebegin', greetingState);

            }, 300); // Wait for fade out
        }

        // Auto-trigger login state if redirected from login page
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('auth') === 'true') {
                simulateLogin();
                // Clean up URL so the auth flag doesn't stay in the address bar
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        };

        // Send Message Simulation
        function sendMessage(e) {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text) return;

            // Clear greeting state on first message
            if (isFirstMessage) {
                const greetingState = document.getElementById('greeting-state');
                if (greetingState) greetingState.remove();
                isFirstMessage = false;
            }

            // Current Time Format
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            // Create Glassmorphism Message DOM Element
            const msgHTML = `
                <article class="flex items-end justify-end gap-2 w-full animate-fade-in mt-auto">
                    <div class="flex flex-col items-end gap-1 max-w-[80%] lg:max-w-[65%]">
                        <div class="bg-brand-500/80 backdrop-blur-md border border-white/20 text-white px-5 py-3.5 rounded-2xl msg-tail-right shadow-lg shadow-brand-500/20 text-[15px] leading-relaxed break-words w-full">
                            ${escapeHTML(text)}
                        </div>
                        <span class="text-xs text-gray-600 font-medium flex items-center gap-1 drop-shadow-sm">
                            ${timeString} 
                            <i class="ph ph-clock"></i>
                        </span>
                    </div>
                </article>
            `;

            // Append to container before the spacer
            chatBottom.insertAdjacentHTML('beforebegin', msgHTML);
            
            // Reset Input
            messageInput.value = '';
            messageInput.style.height = ''; 
            
            // Scroll down
            scrollToBottom();
            
            // Simulate read receipt after 1.5 seconds
            setTimeout(() => {
                const clockIcon = messageContainer.querySelectorAll('.ph-clock');
                if(clockIcon.length > 0) {
                    const lastClock = clockIcon[clockIcon.length - 1];
                    lastClock.className = 'ph-fill ph-check-circle text-brand-500 text-xs drop-shadow-sm';
                }
            }, 1500);
        }

        // Utility to prevent XSS
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        // Handle Enter key to send (Shift+Enter for new line)
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                document.getElementById('send-btn').click();
            }
        });

        // Add simple fade animation CSS dynamically
        const style = document.createElement('style');
        style.textContent = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            }
            #auth-state {
                transition: opacity 0.3s ease-out;
            }
        `;
        document.head.appendChild(style);
        
        // Initial setup
        scrollToBottom();
    </script>
</body>
</html>
